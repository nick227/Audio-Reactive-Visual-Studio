<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="4" stitchTiles="stitch"/></filter>
    <linearGradient id="v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#0a0a0f"/>
